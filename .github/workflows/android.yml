name: Build Android APK

# Збирає Android APK (Хоругва) через Capacitor.
# Запуск вручну: вкладка Actions → "Build Android APK" → Run workflow.
# Готовий APK публікується як GitHub Release → завантажити можна без логіну.
# Також лежить у Artifacts (horugva-apk) унизу сторінки запуску.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Збірка веб-частини (та сама, що й для GitHub Pages)
      - run: npm run build
        env:
          VITE_FAL_PROXY: ${{ vars.VITE_FAL_PROXY }}

      # Домашній екран APK = меню (Грати / Редактор).
      # У вебі index.html — це гра; в APK index.html стає меню, а гра переїжджає в game.html
      - name: Prepare app entry (menu)
        run: |
          mv dist/index.html dist/game.html
          mv dist/menu.html dist/index.html

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      # Генеруємо нативний проєкт і кладемо в нього зібрані веб-асети
      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      # Повноекранний режим — прибираємо сіру смужку статус-бару
      - name: Patch fullscreen theme
        run: |
          for f in android/app/src/main/res/values/styles.xml android/app/src/main/res/values-night/styles.xml; do
            [ -f "$f" ] && sed -i 's|</style>|    <item name="android:windowFullscreen">true</item>\n</style>|' "$f" || true
          done

      # Immersive mode — ховаємо навігаційну панель (кнопки назад/home)
      - name: Patch immersive mode (hide nav bar)
        run: |
          cat > android/app/src/main/java/com/zagaltsi/horugva/MainActivity.java << 'JAVA'
          package com.zagaltsi.horugva;

          import android.os.Build;
          import android.view.View;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) hideSystemUI();
              }
              @Override
              protected void onResume() {
                  super.onResume();
                  hideSystemUI();
              }
              private void hideSystemUI() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      getWindow().setDecorFitsSystemWindows(false);
                      WindowInsetsController c = getWindow().getInsetsController();
                      if (c != null) {
                          c.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          c.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  } else {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_FULLSCREEN);
                  }
              }
          }
          JAVA

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK with friendly name
        run: cp android/app/build/outputs/apk/debug/app-debug.apk horugva.apk

      # Artifact (для завантаження через сторінку Actions)
      - uses: actions/upload-artifact@v4
        with:
          name: horugva-apk
          path: horugva.apk
          if-no-files-found: error

      # GitHub Release — публічне посилання без логіну в GitHub
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-latest"
          # Видаляємо старий реліз, якщо є
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -f "$TAG"
          git push origin "$TAG" --force
          gh release create "$TAG" horugva.apk \
            --title "Хоругва Android APK (остання збірка)" \
            --notes "Debug APK — встановити без Google Play.

          ⚠️ Для встановлення: Налаштування → Безпека → **Дозволити встановлення з невідомих джерел**

          Автоматично зібрано через GitHub Actions." \
            --latest
