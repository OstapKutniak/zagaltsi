<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- HTML не кешуємо (щоб не ловити стару версію); хешовані JS/CSS кешуються самі -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Хоругва</title>
    <!-- Telegram Mini App SDK. У звичайному браузері просто не активується. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* #stage — обгортка гри. У портреті її повертаємо на 90° (див. viewport.ts),
         щоб бітемап завжди був горизонтальним. */
      #stage {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        transform-origin: 0 0;
        background: #000; /* чорні поля (леттербокс) — згодом замінимо дизайном */
      }
      #game { position: absolute; inset: 0; }
      #game canvas { display: block; }

      /* Екранні кнопки керування (рухаються/повертаються разом зі сценою) */
      #touch {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 18px 24px;
        pointer-events: none;
      }
      /* Віртуальний джойстик переміщення (трохи відсунутий від лівого краю) */
      #stick {
        position: relative; width: 132px; height: 132px; margin-left: 28px;
        border-radius: 50%; background: rgba(255, 255, 255, 0.10);
        border: 2px solid rgba(255, 255, 255, 0.28);
        pointer-events: auto; touch-action: none;
      }
      #stickKnob {
        position: absolute; left: 50%; top: 50%; width: 60px; height: 60px;
        margin: -30px 0 0 -30px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.30); border: 2px solid rgba(255, 255, 255, 0.5);
        pointer-events: none;
      }
      #touch .actions { display: flex; gap: 14px; pointer-events: auto; }
      #touch button {
        width: 56px; height: 56px; border-radius: 14px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.12);
        color: #fff; font-size: 22px;
        touch-action: none; user-select: none; -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch .actions button { width: 70px; height: 70px; border-radius: 50%; }
      #touch button:active { background: rgba(255, 255, 255, 0.3); }
      /* На десктопі з мишею кнопки приглушуємо — там грають з клавіатури */
      @media (pointer: fine) { #touch { opacity: 0.25; } }

      /* ---- лобі overlay ---- */
      #lobby {
        position: fixed; inset: 0; background: rgba(0,0,0,.92);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; z-index: 8000;
        font-family: system-ui, sans-serif; color: #e8e8e8;
      }
      #lobby.hidden { display: none; }
      #lobby h2 { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin: 0; }
      #lobby .code { font-size: 42px; font-weight: 900; letter-spacing: 10px; color: #ff9a1f; }
      #lobby .hint { font-size: 13px; color: #9a9a9a; text-align: center; max-width: 280px; line-height: 1.5; }
      #lobby .players { display: flex; flex-direction: column; gap: 6px; width: 260px; }
      #lobby .player-row { background: #232323; border-radius: 8px; padding: 9px 14px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
      #lobby .player-row .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff9a1f; flex-shrink: 0; }
      #lobby button { padding: 12px 28px; border: 0; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; width: 260px; }
      #lobby .btn-primary { background: #ff9a1f; color: #1b1b1b; }
      #lobby .btn-secondary { background: #3b3b3b; color: #e8e8e8; }
      #lobby .btn-danger { background: #3b3b3b; color: #e8e8e8; font-weight: 400; font-size: 13px; padding: 8px; }
      #lobby input { width: 260px; padding: 12px 14px; border-radius: 10px; border: 1px solid #4a4a4a; background: #232323; color: #e8e8e8; font-size: 22px; font-weight: 700; letter-spacing: 8px; text-align: center; text-transform: uppercase; outline: none; }
      #lobby input:focus { border-color: #ff9a1f; }
      #lobby .err { color: #ff6b6b; font-size: 13px; min-height: 16px; }
      #lobby .lb-label { font-size: 12px; color: #9a9a9a; margin-top: 2px; }
      #lobby .lb-chars { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 300px; }
      #lobby .lb-char { width: 60px; height: 60px; border-radius: 10px; background: #232323; border: 2px solid #4a4a4a; cursor: pointer; overflow: hidden; position: relative; }
      #lobby .lb-char img { width: 100%; height: 100%; object-fit: contain; }
      #lobby .lb-char .nm { position: absolute; bottom: 0; left: 0; right: 0; font-size: 9px; background: rgba(0,0,0,.55); padding: 1px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #lobby .lb-char.sel { border-color: #ff9a1f; }

      /* ---- екран завантаження ---- */
      #loadScreen {
        position: fixed; inset: 0; background: #000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px; z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #loadScreen.hide { opacity: 0; pointer-events: none; }
      #loadLabel {
        color: #e8e8e8; font-family: system-ui, sans-serif;
        font-size: 15px; letter-spacing: 3px; text-transform: uppercase;
      }
      #loadTrack {
        width: 220px; height: 3px;
        background: #2a2a2a; border-radius: 2px; overflow: hidden;
      }
      #loadFill {
        height: 100%; width: 0; border-radius: 2px;
        background: #ff9a1f;
        animation: loadProg 2.2s cubic-bezier(.4,0,.2,1) forwards;
      }
      @keyframes loadProg { to { width: 88%; } }
    </style>
  </head>
  <body>
    <div id="loadScreen"><p id="loadLabel">Завантаження</p><div id="loadTrack"><div id="loadFill"></div></div></div>

    <!-- Lobby overlay — hidden until user picks co-op -->
    <div id="lobby" class="hidden">
      <!-- screen: main menu -->
      <div id="lb-menu">
        <h2>Хоругва</h2>
        <p class="lb-label">Твій персонаж:</p>
        <div class="lb-chars" id="lb-chars"></div>
        <button class="btn-primary" id="lb-solo">Грати соло</button>
        <button class="btn-secondary" id="lb-create">Створити лобі</button>
        <button class="btn-secondary" id="lb-join-btn">Приєднатись</button>
      </div>
      <!-- screen: join — enter code -->
      <div id="lb-join" style="display:none;flex-direction:column;align-items:center;gap:16px">
        <h2>Введи код лобі</h2>
        <input id="lb-code-input" maxlength="4" placeholder="XXXX" autocomplete="off" />
        <p class="err" id="lb-join-err"></p>
        <button class="btn-primary" id="lb-join-confirm">Приєднатись</button>
        <button class="btn-danger" id="lb-join-back">Назад</button>
      </div>
      <!-- screen: waiting room -->
      <div id="lb-room" style="display:none;flex-direction:column;align-items:center;gap:16px">
        <h2>Очікування гравців</h2>
        <p class="hint">Надішли друзям цей код:</p>
        <div class="code" id="lb-room-code">----</div>
        <div class="players" id="lb-players"></div>
        <p class="err" id="lb-room-err"></p>
        <button class="btn-primary" id="lb-start" style="display:none">Почати гру</button>
        <button class="btn-danger" id="lb-leave">Вийти з лобі</button>
      </div>
    </div>

    <div id="stage">
      <div id="game"></div>
      <div id="touch">
        <div id="stick"><div id="stickKnob"></div></div>
        <div class="actions">
          <button id="btn-attack" aria-label="удар">✊</button>
          <button id="btn-jump" aria-label="стрибок">⤴</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
