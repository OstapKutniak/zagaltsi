<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Загальці</title>
    <!-- Telegram Mini App SDK. У звичайному браузері просто не активується. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* #stage — обгортка гри. У портреті її повертаємо на 90° (див. viewport.ts),
         щоб бітемап завжди був горизонтальним. */
      #stage {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        transform-origin: 0 0;
        background: #000; /* чорні поля (леттербокс) — згодом замінимо дизайном */
      }
      #game { position: absolute; inset: 0; }
      #game canvas { display: block; }

      /* Екранні кнопки керування (рухаються/повертаються разом зі сценою) */
      #touch {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 18px 24px;
        pointer-events: none;
      }
      #touch .dpad { display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(2, 56px); gap: 8px; pointer-events: auto; }
      #touch .dpad #btn-up { grid-column: 2; grid-row: 1; }
      #touch .dpad #btn-left { grid-column: 1; grid-row: 2; }
      #touch .dpad #btn-down { grid-column: 2; grid-row: 2; }
      #touch .dpad #btn-right { grid-column: 3; grid-row: 2; }
      #touch .actions { display: flex; gap: 14px; pointer-events: auto; }
      #touch button {
        width: 56px; height: 56px; border-radius: 14px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.12);
        color: #fff; font-size: 22px;
        touch-action: none; user-select: none; -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch .actions button { width: 70px; height: 70px; border-radius: 50%; }
      #touch button:active { background: rgba(255, 255, 255, 0.3); }
      /* На десктопі з мишею кнопки приглушуємо — там грають з клавіатури */
      @media (pointer: fine) { #touch { opacity: 0.25; } }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="game"></div>
      <div id="touch">
        <div class="dpad">
          <button id="btn-up" aria-label="вгору">▲</button>
          <button id="btn-left" aria-label="ліворуч">◀</button>
          <button id="btn-down" aria-label="вниз">▼</button>
          <button id="btn-right" aria-label="праворуч">▶</button>
        </div>
        <div class="actions">
          <button id="btn-attack" aria-label="удар">✊</button>
          <button id="btn-jump" aria-label="стрибок">⤴</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
