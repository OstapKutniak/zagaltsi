<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Хоругва - Редактор рівнів</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --bg:#23262e; --panel:#2c303a; --line:#3a3f4b; --ink:#e7eaf0; --muted:#8b93a3; --accent:#5aa0ff; }
      html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); }
      #app { display: flex; height: 100vh; }
      #left { width: 190px; background: var(--panel); border-right: 1px solid #000; overflow-y: auto; padding: 12px; flex: 0 0 auto; }
      #stageWrap { flex: 1; position: relative; background: #2b2f3a; overflow: hidden; }
      #stage { display: block; width: 100%; height: 100%; }
      .hint { position: absolute; top: 10px; left: 12px; font-size: 12px; color: rgba(255,255,255,.5); pointer-events: none; }
      #side { width: 250px; background: var(--panel); border-left: 1px solid #000; overflow-y: auto; padding: 12px; flex: 0 0 auto; }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 14px 0 7px; }
      h2:first-child { margin-top: 0; }
      .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 13px; }
      .row > label { flex: 0 0 70px; color: var(--muted); }
      .row input[type=range] { flex: 1; accent-color: var(--accent); }
      button { background: #39414f; color: var(--ink); border: 0; border-radius: 7px; padding: 7px 10px; cursor: pointer; font-size: 13px; }
      button:hover { background: #454f60; }
      button.accent { background: var(--accent); color: #0a0e16; font-weight: 600; }
      button.on { background: #c2504f; color: #fff; }
      .btns { display: flex; gap: 6px; flex-wrap: wrap; }
      .item { padding: 6px 9px; border-radius: 6px; background: #1b1e25; border: 1px solid var(--line); cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
      .item.sel { background: var(--accent); color: #0a0e16; font-weight: 600; }
      .item .x { opacity: .6; padding: 0 4px; }
      .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
      .tab { padding: 5px 7px; font-size: 11px; background: #1b1e25; border: 1px solid var(--line); border-radius: 6px; color: var(--muted); cursor: pointer; }
      .tab.active { background: var(--accent); border-color: var(--accent); color: #0a0e16; font-weight: 600; }
      #assets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .asset { background: #1b1e25; border: 1px solid var(--line); border-radius: 6px; padding: 4px; cursor: grab; text-align: center; }
      .asset img { width: 100%; height: 54px; object-fit: contain; }
      .asset div { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 14px; }
      hr { border: 0; border-top: 1px solid var(--line); margin: 12px 0; }
      .check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="left">
        <h2>Список рівнів</h2>
        <div class="btns"><button class="accent" id="addLevel">＋ Рівень</button></div>
        <div id="levelList"></div>

        <hr />
        <h2>Налаштування</h2>
        <label class="check"><input type="checkbox" id="snap" checked /> снеп до краю (J)</label>
        <label class="check"><input type="checkbox" id="showCollider" checked /> показ. колайдер</label>
        <div class="row"><label>Клітина</label><input type="range" id="grid" min="20" max="120" step="4" value="48" /><span id="gridV">48</span></div>

        <hr />
        <h2>Маркери</h2>
        <div class="btns">
          <button id="setSpawn">⚑ Спавн</button>
          <button id="setStart">▏Початок</button>
          <button id="setEnd">Кінець▕</button>
        </div>

        <hr />
        <h2>Файл</h2>
        <div class="btns"><button class="accent" id="toGame">🎮 Export у гру</button></div>
        <div class="btns"><button id="exportLevel">⬇ Export рівень (файл)</button></div>
        <div id="status"></div>
      </div>

      <div id="stageWrap">
        <canvas id="stage"></canvas>
        <div class="hint">тягни ассет із бібліотеки сюди · <b>G/R/S/M</b> рух/поворот/розмір/дзеркало · <b>J</b> снеп · <b>Del</b> видалити · <b>Ctrl+Z</b> · колесо — зум · затиск колеса — пан</div>
      </div>

      <div id="side">
        <h2>Бібліотека</h2>
        <div class="tabs" id="catTabs"></div>
        <div class="btns"><button id="loadAsset">＋ Завантажити PNG</button><input type="file" id="fileInput" accept="image/png,image/*" multiple style="display:none" /></div>
        <div id="colliderTools" style="display:none">
          <div class="btns">
            <button id="paintBtn" class="on">🟩 Малювати</button>
            <button id="eraseBtn">🧽 Стирати</button>
            <button id="clearCollider">Очистити</button>
          </div>
          <div id="status2" style="font-size:12px;color:var(--muted);margin-top:6px">Клікай/тягни по полю, щоб позначити, де можна ходити.</div>
        </div>
        <div id="assets"></div>

        <hr />
        <h2>Вибраний обʼєкт</h2>
        <div class="row"><label>Розмір</label><input type="range" id="scale" min="0.1" max="4" step="0.01" value="1" /><span id="scaleV">1.0</span></div>
        <div class="btns"><button id="mirrorBtn">🔄 Дзеркало (M)</button><button id="delBtn">🗑 Видалити</button></div>
      </div>
    </div>
    <script type="module" src="/src/level/main.ts"></script>
  </body>
</html>
