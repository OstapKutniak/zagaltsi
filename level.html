<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Хоругва Studio · Рівень</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --bg:#3b3b3b; --panel:#2d2d2d; --rail:#232323; --line:#4a4a4a; --ink:#e8e8e8; --muted:#9a9a9a; --accent:#ff9a1f; --sel:#c2c2c2; }
      html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; }
      button { background: #4a4a4a; color: var(--ink); border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 13px; }
      button:hover { background: #565656; }
      button.light { background: #e8e8e8; color: #1b1b1b; font-weight: 600; }
      button:disabled { opacity: .4; cursor: default; }
      * { scrollbar-width: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }

      /* ---- identical layout to studio ---- */
      #app { display: flex; height: 100vh; gap: 8px; padding: 8px; }
      .col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
      .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      .header { font-size: 12px; color: var(--ink); text-align: center; padding: 10px; background: var(--rail); border-radius: 11px 11px 0 0; font-weight: 600; width: 100%; border: 0; cursor: pointer; }

      /* ---- left library — same 280px, same card grid ---- */
      #library { width: 280px; flex: 0 0 auto; padding: 8px; }
      #libSelect {
        width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600;
        background: #4a4a4a; color: var(--ink); border: 0; cursor: pointer;
        text-align: center; appearance: none; -webkit-appearance: none;
      }
      .libDel { position:absolute; top:3px; right:3px; width:18px; height:18px; padding:0; border-radius:4px; background:rgba(0,0,0,.6); color:#fff; font-size:14px; line-height:1; display:flex; align-items:center; justify-content:center; z-index:2; }
      #libSelect:hover { background-color: #565656; }
      #libSelect option { background: #2d2d2d; }
      #libAddBtn { width: 100%; }
      #colliderTools { display: none; flex-direction: column; gap: 6px; }
      .cbtns { display: flex; gap: 6px; }
      .cbtns button { flex: 1; font-size: 12px; padding: 7px 4px; }
      #libGrid { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
      .libCard { position: relative; width: calc(50% - 4px); background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: grab; overflow: hidden; }
      .libCard::before { content: ''; display: block; padding-top: 100%; }
      .libCard:hover { border-color: var(--sel); }
      .libCard img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .libName { position: absolute; bottom: 0; left: 0; right: 0; font-size: 10px; background: rgba(0,0,0,.5); padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* ---- center — identical to studio ---- */
      #center { flex: 1; min-width: 0; }
      #topTabs { display: flex; gap: 8px; }
      #topTabs button { flex: 1; padding: 11px 6px; font-size: 14px; }
      #centerMid { flex: 1; position: relative; min-height: 0; }
      #stageWrap { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      #stage { display: block; width: 100%; height: 100%; }
      .hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,.35); pointer-events: none; white-space: nowrap; }

      /* ---- right panel — same 480px as studio ---- */
      #right { width: 480px; flex: 0 0 auto; }
      #preview { flex: 0 0 auto; position: relative; aspect-ratio: 20 / 9; background: var(--rail); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; z-index: 1; }
      #preview.big { position: fixed; top: 8px; right: 8px; aspect-ratio: auto; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,.6); }
      #preview iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
      #previewHint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; pointer-events: none; }
      #previewClick { position: absolute; inset: 0; z-index: 5; cursor: default; }
      #iconBar { display: flex; gap: 6px; padding: 2px; }
      .iconToggle { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 9px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; color: #fff; }
      .iconToggle svg { width: 20px; height: 20px; }
      .iconToggle.on { background: var(--accent); border-color: var(--accent); color: #1b1b1b; }
      #tools { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
      #tools .body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      .btns { display: flex; gap: 6px; }
      .btns button { flex: 1; font-size: 12px; padding: 8px 4px; }
      .row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
      .row > label { flex: 0 0 64px; color: var(--muted); }
      .row input[type=range] { flex: 1; accent-color: var(--sel); }
      .val { flex: 0 0 36px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
      .check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
      .check input { accent-color: var(--accent); }
      .sec-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 600; margin-top: 4px; }
      hr { border: 0; border-top: 1px solid var(--line); }
      .item { padding: 6px 9px; border-radius: 8px; background: var(--rail); border: 1px solid var(--line); cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
      .item.sel { background: var(--accent); color: #1b1b1b; font-weight: 600; border-color: var(--accent); }
      .item .x { opacity: .5; padding: 0 4px; font-size: 11px; }
      #levelList { display: flex; flex-wrap: wrap; gap: 6px; max-height: 230px; overflow-y: auto; align-content: flex-start; }
      .lvCard { position: relative; width: calc(33.333% - 4px); aspect-ratio: 1; background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; color: var(--ink); padding: 6px; overflow: hidden; }
      .lvCard:hover { border-color: var(--sel); }
      .lvCard.sel { border-color: var(--accent); background: rgba(255,154,31,.16); color: #fff; font-weight: 600; }
      .lvCard.empty { opacity: .45; }
      .lvCard.empty:hover { opacity: 1; }
      .lvDel { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; padding: 0; border-radius: 4px; background: rgba(0,0,0,.6); color: #fff; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
      .planPanel { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      #planToggle.on { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .secToggle { text-align: left; }
      .secToggle::before { content: '▸ '; opacity: .8; }
      .secToggle.open::before { content: '▾ '; }
      .secBody { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      #npcList { display: flex; flex-wrap: wrap; gap: 6px; max-height: 230px; overflow-y: auto; align-content: flex-start; }
      .npcCard { position: relative; width: calc(33.333% - 4px); aspect-ratio: 1; background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: grab; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .npcCard:active { cursor: grabbing; }
      .npcCard img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }
      .npcCard .npcName { position: absolute; bottom: 2px; left: 2px; right: 2px; font-size: 10px; text-align: center; color: #fff; text-shadow: 0 1px 2px #000; pointer-events: none; }
      .npcEmpty { font-size: 12px; color: var(--muted); padding: 8px 2px; }
      .planHead { display: flex; }
      .planHead button { flex: 1; border-radius: 0; font-size: 12px; padding: 7px 4px; }
      .planHead button.on { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .planBody { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; }
      .planBody button { flex: 1 1 calc(50% - 3px); font-size: 12px; padding: 7px 4px; }
      #fillMenu { position: absolute; left: 8px; bottom: 8px; flex-direction: column-reverse; gap: 6px; z-index: 6; width: 180px; }
      .fillBtn { display: block; width: 100%; text-align: center; padding: 9px 8px; border-radius: 8px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; font-size: 13px; color: var(--ink); }
      .fillBtn:hover { background: #565656; }
      .fillBtn.off { opacity: .45; text-decoration: line-through; }
      #statusBar { font-size: 12px; color: var(--muted); min-height: 14px; }
    </style>
  </head>
  <body>
    <div id="app">

      <!-- ЛІВА БІБЛІОТЕКА (280px, identical to studio) -->
      <aside id="library" class="col pane">
        <select id="libSelect" style="text-align:center">
          <option value="sky">Небо</option>
          <option value="bg">Фон</option>
          <option value="map" selected>Карта</option>
          <option value="decor">Декор</option>
          <option value="collider">Колайдер</option>
          <option value="interactive">Інтерактив</option>
          <option value="trap">Пастки</option>
        </select>
        <input type="file" id="fileInput" accept="image/png,image/*" multiple style="display:none" />
        <div id="colliderTools" style="display:none"></div>
        <div id="libGrid"></div>
      </aside>

      <!-- ЦЕНТР (flex:1, same as studio) -->
      <section id="center" class="col">
        <div id="topTabs">
          <button id="tabChar">Редактор Персонажів</button>
          <button class="light">Редактор Рівнів</button>
          <button disabled>Редактор Інтерфейсу</button>
          <button disabled>Редактор Звуку</button>
          <button id="playGame" title="Запустити гру" style="background:var(--accent);color:#1b1b1b;font-weight:600">▶ Грати</button>
        </div>
        <div id="centerMid">
          <div id="stageWrap">
            <canvas id="stage"></canvas>
            <div class="hint">тягни ассет · <b>G/R/S/M</b> · <b>Shift+D</b> дублювати · <b>H/V</b> шлях · <b>Y</b> стерти шлях · <b>J</b> снеп · <b>Del</b> · <b>Ctrl+Z</b> · колесо — зум</div>
            <div id="fillMenu" style="display:none"></div>
          </div>
        </div>
        <!-- TOOLBAR — ідентичний по розміру #timelineBar у персонажному редакторі -->
        <div id="levelToolbar" class="pane" style="flex:0 0 auto;display:flex;min-height:56px;padding:6px 8px;gap:6px;align-items:flex-start">
          <button id="pathHBtn" title="Намалювати горизонтальний шлях (земля)">Горизонтальний шлях</button>
          <button id="pathVBtn" title="Намалювати вертикальний шлях (стіна)">Вертикальний шлях</button>
          <button id="erasePathBtn" title="Видалити клітинку шляху">Видалити шлях</button>
          <button id="enemySpawnBtn" title="Намалювати зону спавна ворогів (червоний 3×3). Ворог зʼявиться у випадковій точці зони.">Спавн ворогів</button>
          <button id="enemyEraseBtn" title="Прибрати зону спавна ворогів під курсором">Прибрати спавн ворогів</button>
          <button id="clearCollider" style="margin-left:auto" title="Очистити всі шляхи">Очистити все</button>
        </div>
      </section>

      <!-- ПРАВА ПАНЕЛЬ (480px, identical to studio) -->
      <aside id="right" class="col">
        <div id="preview">
          <iframe id="previewFrame" src="index.html" title="Превʼю гри"></iframe>
          <div id="previewHint">Превʼю гри 20:9</div>
          <div id="previewClick" title="Клік — активувати"></div>
        </div>
        <div id="iconBar">
          <!-- Режим 20:9 (ON за замовчуванням) -->
          <button class="iconToggle on" id="camViewBtn" title="Накласти вид камери 20:9">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 5V3M17 5V3M7 19v2M17 19v2"/></svg>
          </button>
          <!-- Колайдери + спавни (одна кнопка) -->
          <button class="iconToggle" id="showDebugBtn" title="Показати/сховати колайдери та спавн-точки">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><circle cx="17" cy="17" r="4"/><path d="M17 14v3M17 17h3"/></svg>
          </button>
          <!-- Лінії старт/фініш -->
          <button class="iconToggle" id="linesBtn" title="Показати/сховати лінії початку і кінця рівня">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 3v18M18 3v18"/></svg>
          </button>
          <!-- Атмосфера у вьюпорті -->
          <button class="iconToggle" id="showAtmBtn" title="Показати/сховати атмосферу (дощ, туман) у вьюпорті">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/><path d="M8 19v2M12 17v4M16 19v2"/></svg>
          </button>
          <!-- Анімації у вьюпорті -->
          <button class="iconToggle" id="showAnimBtn" title="Показати/сховати анімації ассетів у вьюпорті">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <!-- Ч/Б -->
          <button class="iconToggle" id="bwBtn" title="Чорно-біле превʼю (тон без кольору)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18V3z" fill="currentColor" stroke="none"/></svg>
          </button>
          <!-- Виріз фону (ON за замовчуванням) -->
          <button class="iconToggle on" id="keyBgBtn" title="Вирізати рівний фон при імпорті PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/><circle cx="7" cy="6" r="1.5" fill="currentColor"/><circle cx="7" cy="18" r="1.5" fill="currentColor"/></svg>
          </button>
          <!-- Конструктор UI -->
          <button class="iconToggle" id="constructorBtn" title="Конструктор — коди елементів UI">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 9v12"/></svg>
          </button>
        </div>
        <div id="tools" class="pane" style="display:flex;flex-direction:column">
          <!-- Секція: Рівні -->
          <button id="secLevels" class="header secToggle open">Рівні</button>
          <div id="bodyLevels" class="secBody">
            <button id="addLevel" style="width:100%;background:var(--accent);color:#1b1b1b;font-weight:600;padding:8px">＋ Новий рівень</button>
            <div id="levelList"></div>
            <button id="saveLevelBtn" style="width:100%;font-size:12px;padding:8px 4px">Зберегти рівень</button>
          </div>
          <!-- Секція: Налаштування -->
          <button id="secSettings" class="header secToggle">Налаштування</button>
          <div id="bodySettings" class="secBody" style="display:none">
            <button id="fillBtn" style="width:100%;font-size:12px;padding:8px 4px">Наповнення</button>
            <button id="planToggle" style="width:100%;font-size:12px;padding:8px 4px">Плановість</button>
            <div class="planPanel" id="planPanel">
              <div class="planHead">
                <button id="planBgBtn" class="on">Фонова</button>
                <button id="planGameBtn">Ігрова</button>
              </div>
              <div id="planBg" class="planBody">
                <button id="zForward">Ближче</button>
                <button id="zBack">Дальше</button>
                <button id="zFront">Найближче</button>
                <button id="zBottom">Найдальше</button>
              </div>
              <div id="planGame" class="planBody" style="display:none">
                <button disabled>—</button>
                <button disabled>—</button>
              </div>
            </div>
            <!-- слайдер розміру схований (керування через S), але лишається для логіки -->
            <div class="row" style="display:none">
              <label>Розмір</label>
              <input type="range" id="scale" min="0.1" max="4" step="0.01" value="1" />
              <span class="val" id="scaleV">1.0</span>
            </div>
          </div>
          <!-- Секція: Неігрові персонажі -->
          <button id="secNpc" class="header secToggle">Неігрові персонажі</button>
          <div id="bodyNpc" class="secBody" style="display:none">
            <div class="planHead">
              <button id="npcEnemyBtn" class="on">Вороги</button>
              <button id="npcNeutralBtn">Нейтрали</button>
            </div>
            <div id="npcList"></div>
          </div>
          <!-- Футер -->
          <div class="body" style="margin-top:auto">
            <hr />
            <button id="toGame" style="width:100%;background:var(--accent);color:#1b1b1b;font-weight:600">Оновити гру</button>
            <div id="statusBar"></div>
          </div>
        </div>
      </aside>

    </div>
    <script type="module" src="/src/level/main.ts"></script>
  </body>
</html>
