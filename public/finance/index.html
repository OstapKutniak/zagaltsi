<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Фінанси">
  <meta name="theme-color" content="#f4f4f7">
  <title>Фінанси</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="topbar">
      <button class="icon-btn" id="btn-profile" title="Налаштування">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </button>
      <div class="total" id="btn-accounts-filter">
        <div class="total-label">Всі рахунки</div>
        <div class="total-amount" id="total-amount">0 <span>UAH</span></div>
      </div>
      <button class="icon-btn" id="btn-accounts-filter2" title="Рахунки">
        <svg viewBox="0 0 24 24"><path d="M3 21V9l9-6 9 6v12"/><path d="M9 21v-6h6v6"/></svg>
      </button>
    </div>
    <div class="month-row">
      <button class="mchevron" id="prev-month">«</button>
      <button class="month-pill" id="btn-period">
        <span class="daycount" id="daycount">30</span>
        <span id="month-label">ЧЕРВЕНЬ 2026</span>
        <span class="caret">▼</span>
      </button>
      <button class="mchevron" id="next-month">»</button>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="screen active" id="categories-screen">
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- RECORDS -->
  <div class="screen" id="records-screen">
    <div class="rec-scroll" id="rec-list"></div>
  </div>

  <!-- ACCOUNTS -->
  <div class="screen" id="accounts-screen">
    <div id="acc-list"></div>
  </div>

  <!-- OVERVIEW -->
  <div class="screen" id="overview-screen">
    <div class="ov-wrap" id="ov-wrap"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tab" data-tab="accounts">
      <span class="tab-ic"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/></svg></span>
      Рахунки
    </button>
    <button class="tab active" data-tab="categories">
      <span class="tab-ic"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9h-9z"/><path d="M12 3v9h9"/></svg></span>
      Категорії
    </button>
    <button class="tab" data-tab="records">
      <span class="tab-ic"><svg viewBox="0 0 24 24"><path d="M6 2h12v20l-3-2-3 2-3-2-3 2z"/><path d="M9 7h6M9 11h6"/></svg></span>
      Операції
    </button>
    <button class="tab" data-tab="overview">
      <span class="tab-ic"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg></span>
      Огляд
    </button>
  </div>

  <button class="fab show" id="fab">+</button>

  <!-- ADD / EDIT FORM -->
  <div class="sheet-full" id="add-view">
    <div class="form-header">
      <button class="form-close" id="add-close">Скасувати</button>
      <span class="form-title" id="add-title">Нова операція</span>
      <button class="form-save" id="add-save">Зберегти</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn active expense" data-type="expense">Витрата</button>
      <button class="type-btn income" data-type="income">Дохід</button>
      <button class="type-btn transfer" data-type="transfer">Переказ</button>
    </div>
    <div class="amount-block">
      <input class="amount-input" id="amount-input" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
    </div>
    <div class="form-scroll">
      <div class="form-row">
        <div class="form-field" id="field-category">
          <span class="field-icon" id="cat-icon">🏷️</span>
          <span class="field-label">Категорія</span>
          <span class="field-value placeholder" id="cat-value">Обрати</span>
        </div>
        <div class="form-field" id="field-account">
          <span class="field-icon">💳</span>
          <span class="field-label">Рахунок</span>
          <span class="field-value placeholder" id="acc-value">Обрати</span>
        </div>
        <div class="form-field" id="field-to-account" style="display:none">
          <span class="field-icon">→</span>
          <span class="field-label">На рахунок</span>
          <span class="field-value placeholder" id="to-acc-value">Обрати</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <span class="field-icon">📅</span>
          <span class="field-label">Дата</span>
          <input class="field-input" id="date-input" type="datetime-local">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <span class="field-icon">📝</span>
          <span class="field-label">Коментар</span>
          <input class="field-input" id="note-input" type="text" placeholder="Необов'язково">
        </div>
      </div>
    </div>
  </div>

  <!-- PICKER / GENERIC SHEET -->
  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheet-title">Оберіть</div>
      <input class="sheet-search" id="sheet-search" type="text" placeholder="Пошук або нова назва...">
      <div class="sheet-list" id="sheet-list"></div>
    </div>
  </div>

  <!-- PERIOD SHEET -->
  <div class="sheet-overlay" id="period-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Період</div>
      <div class="period-grid">
        <button class="period-btn wide" data-period="month" id="pb-month">
          <div class="pb-ic" id="pb-month-day">30</div>
          <div class="pb-lbl">Місяць</div>
          <div class="pb-sub" id="pb-month-sub">Червень 2026</div>
        </button>
        <button class="period-btn" data-period="all">
          <div class="pb-ic">∞</div>
          <div class="pb-lbl">Весь час</div>
        </button>
        <button class="period-btn" data-period="year">
          <div class="pb-ic">365</div>
          <div class="pb-lbl">Рік</div>
          <div class="pb-sub" id="pb-year-sub">Рік 2026</div>
        </button>
      </div>
    </div>
  </div>

  <!-- SETTINGS SHEET -->
  <div class="sheet-overlay" id="settings-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Налаштування</div>
      <div class="settings-row" id="btn-import">
        <span class="r-ic">⬆️</span>
        <div class="r-tx">Імпорт CSV<div class="r-sub">Завантажити дані з 1money</div></div>
        <span style="color:var(--text3)">›</span>
      </div>
      <div class="settings-row">
        <span class="r-ic">🔗</span>
        <div class="r-tx">Синхронізація<div class="r-sub">Firebase · horugva-ff8bd</div></div>
        <span class="dot"></span>
      </div>
      <div class="import-progress" id="import-progress" style="display:none">
        <div id="import-progress-text" style="font-weight:600;text-align:center;font-size:14px"></div>
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
        <div class="import-status" id="import-status"></div>
      </div>
    </div>
  </div>

  <input type="file" id="import-file" accept=".csv,.txt">
  <div class="toast" id="toast"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
