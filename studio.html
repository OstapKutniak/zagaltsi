<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Хоругва Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --bg:#23262e; --panel:#2c303a; --rail:#1b1e25; --line:#3a3f4b; --ink:#e7eaf0; --muted:#8b93a3; --accent:#5aa0ff; }
      html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; }
      #app { display: flex; height: 100vh; }

      /* ---- лівий рейл розділів ---- */
      #rail { width: 86px; flex: 0 0 auto; background: var(--rail); border-right: 1px solid #000; display: flex; flex-direction: column; }
      #brand { padding: 12px 6px; text-align: center; border-bottom: 1px solid var(--line); }
      #brand .logo { font-size: 22px; line-height: 1; }
      #brand .name { font-size: 10px; letter-spacing: .5px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }
      #sections { flex: 1; overflow-y: auto; padding: 8px 6px; display: flex; flex-direction: column; gap: 6px; }
      .navBtn { background: transparent; color: var(--muted); border: 1px solid transparent; border-radius: 9px; padding: 9px 4px; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .navBtn .ic { font-size: 21px; line-height: 1; }
      .navBtn:hover { background: #262a33; color: var(--ink); }
      .navBtn.active { background: var(--accent); color: #0a0e16; border-color: var(--accent); font-weight: 600; }
      .navBtn.soon { opacity: .4; cursor: default; }
      .navBtn.soon:hover { background: transparent; color: var(--muted); }
      .railNote { font-size: 9px; color: var(--muted); text-align: center; padding: 8px 4px; border-top: 1px solid var(--line); }

      /* ---- робоча зона: секції-iframe ---- */
      #work { flex: 1; position: relative; min-width: 0; }
      .frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg); }
      .hidden { display: none; }
      #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--muted); text-align: center; padding: 20px; }
      #placeholder .big { font-size: 40px; }
    </style>
  </head>
  <body>
    <div id="app">
      <nav id="rail">
        <div id="brand"><div class="logo">🍺</div><div class="name">Студія</div></div>
        <div id="sections"></div>
        <div class="railNote">розділи додаються</div>
      </nav>
      <div id="work">
        <div id="placeholder"><div class="big">⏳</div><div>Завантаження розділу…</div></div>
      </div>
    </div>

    <script type="module">
      // Оболонка «міні-блендера»: один екран, ліворуч — перемикач розділів.
      // Кожен розділ — наявна тулза, вбудована через iframe (спільний домен →
      // спільні дані в IndexedDB/localStorage). Нутрощі секцій НЕ чіпаємо;
      // згодом мігруємо їх у спільний UI. Додати розділ = додати запис у SECTIONS.
      const SECTIONS = [
        { key: 'char',  label: 'Персонаж', icon: '🧍', src: 'rig.html' },
        { key: 'level', label: 'Рівень',   icon: '🗺️', src: 'level.html' },
        { key: 'game',  label: 'Гра',       icon: '🎮', src: 'index.html' },
        // приклад майбутнього розділу (поки заглушка):
        { key: 'enemies', label: 'Вороги', icon: '👹', soon: true },
      ];
      const LAST_KEY = 'zag_studio_section';

      const work = document.getElementById('work');
      const railBox = document.getElementById('sections');
      const placeholder = document.getElementById('placeholder');
      const frames = {};   // key -> iframe (ледаче створення)
      const buttons = {};
      let active = null;

      function show(key) {
        const sec = SECTIONS.find((s) => s.key === key);
        if (!sec || sec.soon) return;
        // ледаче створення iframe при першому відкритті
        if (!frames[key]) {
          const f = document.createElement('iframe');
          f.className = 'frame';
          f.src = sec.src;
          f.title = sec.label;
          work.appendChild(f);
          frames[key] = f;
        }
        for (const k of Object.keys(frames)) frames[k].classList.toggle('hidden', k !== key);
        for (const k of Object.keys(buttons)) buttons[k].classList.toggle('active', k === key);
        placeholder.classList.add('hidden');
        active = key;
        try { localStorage.setItem(LAST_KEY, key); } catch { /* ignore */ }
        document.title = `Хоругва Studio · ${sec.label}`;
      }

      for (const s of SECTIONS) {
        const b = document.createElement('button');
        b.className = 'navBtn' + (s.soon ? ' soon' : '');
        b.innerHTML = `<span class="ic">${s.icon}</span><span>${s.label}</span>`;
        if (s.soon) b.title = 'Скоро';
        else b.onclick = () => show(s.key);
        railBox.appendChild(b);
        buttons[s.key] = b;
      }

      // відкрити останній активний розділ (або перший доступний)
      let start = 'char';
      try { const saved = localStorage.getItem(LAST_KEY); if (saved && SECTIONS.some((s) => s.key === saved && !s.soon)) start = saved; } catch { /* ignore */ }
      show(start);
    </script>
  </body>
</html>
