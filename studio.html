<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- HTML не кешуємо (щоб не ловити стару версію); хешовані JS/CSS кешуються самі -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Хоругва Studio · Персонаж</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* нейтральна сіра палітра (saturation 0), без синього; помаранчевий — лише активне */
      :root { --bg:#3b3b3b; --panel:#2d2d2d; --rail:#232323; --line:#4a4a4a; --ink:#e8e8e8; --muted:#9a9a9a; --accent:#ff9a1f; --sel:#c2c2c2; }
      html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; }
      button { background: #4a4a4a; color: var(--ink); border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 13px; }
      button:hover { background: #565656; }
      button.light { background: #e8e8e8; color: #1b1b1b; font-weight: 600; } /* активна / світла з темним написом */
      button:disabled { opacity: .4; cursor: default; }
      /* ховаємо скролбари — гортання колесом (видно по руху карток) */
      * { scrollbar-width: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }

      #app { display: flex; height: 100vh; gap: 8px; padding: 8px; }
      .col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
      .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      .header { font-size: 12px; color: var(--ink); text-align: center; padding: 10px; background: var(--rail); border-radius: 11px 11px 0 0; font-weight: 600; width: 100%; border: 0; cursor: pointer; }

      /* ---- ліва бібліотека (ширша) ---- */
      #library { width: 280px; flex: 0 0 auto; padding: 8px; }
      #libToggle { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
      #libList { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
      .libCard { position: relative; width: calc(50% - 4px); background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; overflow: hidden; }
      .libCard::before { content: ''; display: block; padding-top: 100%; } /* квадрат: у flex % padding надійно бере ширину картки */
      .libCard.empty { cursor: default; background: #434343; }
      .libCard:not(.empty):hover { border-color: var(--sel); }
      .libCard img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .libName { position: absolute; bottom: 0; left: 0; right: 0; font-size: 10px; background: rgba(0,0,0,.5); padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .libDel { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; padding: 0; border-radius: 50%; background: rgba(0,0,0,.55); font-size: 11px; line-height: 1; }

      /* ---- центр ---- */
      #center { flex: 1; min-width: 0; }
      #topTabs { display: flex; gap: 8px; }
      #topTabs button { flex: 1; padding: 11px 6px; font-size: 14px; }
      #centerMid { flex: 1; position: relative; min-height: 0; }
      #stageWrap { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      #stage { display: block; width: 100%; height: 100%; }
      /* список частин — N-панель: НАКЛАДАЄТЬСЯ на в'юпорт (не відсуває), кожна кнопка окремо, без фону */
      #partsList { position: absolute; top: 8px; right: 8px; width: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
      #faceList { position: absolute; width: 200px; display: none; flex-direction: column; gap: 6px; z-index: 6; }
      #slotChips, #faceChips { display: flex; flex-direction: column; gap: 6px; }
      .chip { display: block; width: 100%; text-align: center; padding: 9px 8px; border-radius: 8px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; font-size: 13px; color: var(--ink); }
      .chip:hover { background: #565656; }
      .chip.sel { background: #e8e8e8; color: #1b1b1b; border-color: #e8e8e8; font-weight: 600; }
      .chip.empty { color: var(--muted); }

      /* ---- таймлайн знизу (нейтральний, без піктограм) ---- */
      #timelineBar { flex: 0 0 auto; padding: 8px; }
      .tlrow { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
      .tlrow select { background: var(--rail); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 13px; }
      .tlrow button { font-size: 12px; }
      .tltime { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; margin-left: auto; }
      /* трек анімації: номери кадрів зверху, вертикальний плейхед, ключі */
      #track { position: relative; height: 54px; background: var(--rail); border: 1px solid var(--line); border-radius: 8px; margin-top: 2px; cursor: pointer; overflow: visible; user-select: none; }
      #track .tick { position: absolute; top: 2px; transform: translateX(-50%); color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; pointer-events: none; }
      #track .tick::after { content: ''; position: absolute; left: 50%; top: 14px; width: 1px; height: 6px; background: var(--line); }
      .keyDot { position: absolute; bottom: 8px; width: 12px; height: 12px; margin-left: -6px; border-radius: 50%; background: var(--accent); border: 1px solid #000; cursor: pointer; z-index: 3; overflow: visible; }
      .keyDot.sel { background: #fff; }
      .keyDot.smooth { border-radius: 3px; }
      .dotLabel { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 8px; color: var(--accent); pointer-events: none; white-space: nowrap; font-variant-numeric: tabular-nums; opacity: 0.85; }
      .keyDot.sel .dotLabel { color: #fff; }
      .playhead { position: absolute; top: 0; bottom: 0; width: 2px; margin-left: -1px; background: var(--accent); pointer-events: none; z-index: 4; }
      .frameMark { position: absolute; top: 0; bottom: 0; width: 2px; margin-left: -1px; background: #fff; opacity: .5; pointer-events: none; z-index: 2; }
      .phBadge { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--accent); color: #1b1b1b; font-size: 10px; font-weight: 600; padding: 1px 4px; border-radius: 0 0 4px 4px; font-variant-numeric: tabular-nums; }
      /* Ghost markers on timeline */
      .ghostMark { position: absolute; top: 0; bottom: 0; width: 14px; margin-left: -7px; background: linear-gradient(to right,transparent calc(50% - 1px),rgba(255,154,31,.8) calc(50% - 1px),rgba(255,154,31,.8) calc(50% + 1px),transparent calc(50% + 1px)); cursor: ew-resize; z-index: 3; pointer-events: auto; }
      .ghostFill { position: absolute; top: 0; bottom: 0; background: rgba(255,154,31,0.12); pointer-events: none; z-index: 1; }

      /* ---- права панель (ширша) ---- */
      #right { width: 480px; flex: 0 0 auto; }
      #preview { flex: 0 0 auto; position: relative; aspect-ratio: 20 / 9; background: var(--rail); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; z-index: 1; }
      #preview.big { position: fixed; top: 8px; right: 8px; aspect-ratio: auto; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,.6); }
      #preview iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
      #previewHint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; pointer-events: none; }
      #previewClick { position: absolute; inset: 0; z-index: 5; cursor: default; }
      #iconBar { display: flex; gap: 6px; padding: 2px; }
      .iconToggle { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 9px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; color: #fff; }
      .iconToggle input { display: none; }
      .iconToggle svg { width: 20px; height: 20px; }
      .iconToggle:has(input:checked) { background: var(--accent); border-color: var(--accent); color: #1b1b1b; }
      #tools { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
      #tools .body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      .btns { display: flex; gap: 6px; }
      .btns.oneRow button { flex: 1; font-size: 12px; padding: 8px 4px; }
      #imgGrid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 224px; overflow-y: auto; align-content: flex-start; }
      .imgCell { position: relative; width: calc(33.333% - 4px); background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; cursor: pointer; }
      .imgCell::before { content: ''; display: block; padding-top: 100%; } /* квадрат */
      .imgCell.empty { cursor: default; background: #434343; }
      .imgCell.sel { border-color: var(--accent); }
      .imgCell:not(.empty):hover { border-color: var(--sel); }
      .imgCell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
      .row > label { flex: 0 0 64px; color: var(--muted); }
      .row input[type=range] { flex: 1; accent-color: var(--sel); }
      .val { flex: 0 0 36px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
      details.adv { border-top: 1px solid var(--line); padding-top: 6px; }
      details.adv summary { cursor: pointer; color: var(--muted); font-size: 12px; padding: 4px 0; }
      details.adv .row { margin-top: 6px; }
      #status { font-size: 12px; color: var(--muted); min-height: 0; }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ЛІВА БІБЛІОТЕКА -->
      <aside id="library" class="col pane">
        <button id="libToggle" class="light">Герої</button>
        <div id="libList"></div>
      </aside>

      <!-- ЦЕНТР -->
      <section id="center" class="col">
        <div id="topTabs">
          <button class="light" data-tab="char">Редактор Персонажів</button>
          <button data-go="level.html">Редактор Рівнів</button>
          <button data-soon>Редактор Інтерфейсу</button>
          <button data-soon>Редактор Звуку</button>
          <button data-soon>Редактор Історії</button>
        </div>
        <div id="centerMid">
          <div id="stageWrap"><canvas id="stage"></canvas></div>
          <div id="partsList"><div id="slotChips"></div></div>
          <div id="faceList"><div id="faceChips"></div></div>
        </div>
        <div id="timelineBar" class="pane">
          <div class="tlrow">
            <select id="anim" style="flex:2;min-width:0"></select>
            <select id="charSel" title="Персонаж (свій набір анімацій)" style="flex:1.2;min-width:0"></select>
            <button id="keyBtn">Ключ (K)</button>
            <button id="delKeyBtn">Видалити ключ</button>
            <button id="linkBtn" title="ПКМ — перемкнути лінійно/згладжено">Звʼязати: лінійно</button>
            <button id="bakeBtn">Зберегти</button>
            <button id="copyAnimBtn" title="ПКМ — перемкнути на Вставити">Скопіювати</button>
            <button id="renameAnimBtn">Перейменувати</button>
            <button id="delAnimBtn">Видалити</button>
            <button id="resetAnim">Скинути</button>
            <button id="hotkeyBtn" title="Призначити клавішу-тригер для цієї анімації у грі">Хоткей (-)</button>
          </div>
          <div class="tlrow">
            <button id="ghostBtn" title="Показувати попередні/наступні кадри як привиди під персонажем">Привид</button>
            <button id="firstFrameBtn" title="Показувати перший кадр анімації як прозорий орієнтир">Перший кадр</button>
            <button id="invertBtn" title="Інвертувати напрям обертання вибраної частини між 2 виділеними ключами (Shift-клік по точках)">Інвертувати</button>
            <button id="allKeyBtn" title="Поставити загальний ключ для всіх частин тіла (те саме що K)">Загальний ключ</button>
          </div>
          <div id="track" title="Колесо — більше/менше кадрів у полі зору"></div>
        </div>
      </section>

      <!-- ПРАВА ПАНЕЛЬ -->
      <aside id="right" class="col">
        <div id="preview"><iframe id="previewFrame" title="Превʼю гри"></iframe><div id="previewHint">Превʼю гри 20:9</div><div id="previewClick" title="ЛКМ — розгорнути / згорнути"></div></div>
        <div id="iconBar">
          <label class="iconToggle" title="Показувати півоти"><input type="checkbox" id="showPivots" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></label>
          <label class="iconToggle" title="Показувати фоновий концепт"><input type="checkbox" id="showRef" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M3 17l5-4 4 3 3-3 6 5"/></svg></label>
          <label class="iconToggle" title="Чистити фон при завантаженні"><input type="checkbox" id="keyBg" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l1.7 4.6L18 9.3l-4.3 1.7L12 16l-1.7-5L6 9.3l4.3-1.7zM18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg></label>
          <label class="iconToggle" title="Чорно-біле превʼю (тон без кольору)"><input type="checkbox" id="bwPreview" /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18V3z" fill="currentColor" stroke="none"/></svg></label>
          <button class="iconToggle" id="setHeadLine" title="Лінію висоти — на маківку цього персонажа"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M12 9v9M8 14l4 4 4-4"/></svg></button>
        </div>
        <div id="tools" class="pane">
          <button id="partsToggle" class="header">Частини персонажа</button>
          <div class="body">
            <div class="btns oneRow">
              <button id="setPivot">Півот (Q)</button>
              <button id="mirrorBtn">Мірор (M)</button>
              <button id="cutBtn">Розріз (D)</button>
              <button id="bendFlipBtn">Напрям (B)</button>
              <button id="flipAllBtn">Фліп</button>
            </div>
            <button id="loadImgBtn">Завантажити картинку</button>
            <input type="file" id="fileInput" accept="image/png,image/*" multiple style="display:none" />
            <div id="imgGrid"></div>

            <div class="btns">
              <button id="saveChar" style="flex:1">Зберегти персонажа</button>
              <button id="exportBtn" style="flex:1" title="ПКМ — перемкнути на Імпорт">Експортувати JSON</button>
              <button id="importBtn" style="display:none"></button>
              <input type="file" id="importInput" accept="application/json" style="display:none" />
            </div>
            <div class="btns"><button id="toGameBtn" style="flex:1">Експорт у гру</button></div>

            <!-- приховані контролі (доступ через хоткеї/мишу та грід); концепт вантажиться кнопкою «Завантажити картинку» коли вибрано «Фоновий концепт» -->
            <div id="adv" style="display:none">
              <input type="range" id="rot" min="-180" max="180" step="1" /><span id="rotV"></span>
              <input type="range" id="scale" min="0.1" max="3" step="0.01" /><span id="scaleV"></span>
              <input type="range" id="bend" min="-150" max="150" step="1" value="0" /><span id="bendV"></span>
              <button id="resetPart"></button>
              <button id="faceBtn"></button>
              <button id="animDirBtn"></button>
              <button id="refBtn"></button><button id="refClear"></button>
              <input type="file" id="refInput" accept="image/*" />
            </div>
            <div id="status"></div>
          </div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/rig/main.ts"></script>
  </body>
</html>
