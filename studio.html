<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- HTML не кешуємо (щоб не ловити стару версію); хешовані JS/CSS кешуються самі -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Хоругва Studio · Персонаж</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* нейтральна сіра палітра (saturation 0), без синього; помаранчевий — лише активне */
      :root { --bg:#3b3b3b; --panel:#2d2d2d; --rail:#232323; --line:#4a4a4a; --ink:#e8e8e8; --muted:#9a9a9a; --accent:#ff9a1f; --sel:#c2c2c2; }
      html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; }

      /* ---- Tab mode switching ---- */
      /* Level editor panels: hidden by default (char mode) */
      #lv-library, #lv-right { display: none; }
      #lv-stageWrap { display: none; }
      /* When level mode: show level panels, hide char panels */
      .mode-level #lv-library { display: flex; }
      .mode-level #lv-right { display: flex; }
      .mode-level #lv-stageWrap { display: block; }
      .mode-level #library { display: none; }
      .mode-level #right { display: none; }
      .mode-level #timelineBar { display: none; }
      .mode-level #stageWrap { display: none; }
      #lv-levelToolbar { display: none; flex: 0 0 auto; height: var(--panel-h, 56px); min-height: 56px; padding: 6px 8px; gap: 6px; align-items: flex-start; }
      .mode-level #lv-levelToolbar { display: flex; }
      /* AI-панелі (опис персонажа / декорації) тієї ж висоти, що й таймлайн — спільне --panel-h */
      #aiPanel, #lv-aiPanel { height: var(--panel-h, 220px); }
      .mode-level #partsList { display: none !important; }
      .mode-level #faceList { display: none !important; }
      button { background: #4a4a4a; color: var(--ink); border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 13px; }
      button:hover { background: #565656; }
      button.light { background: #e8e8e8; color: #1b1b1b; font-weight: 600; } /* активна / світла з темним написом */
      button.light:hover { background: #cfcfcf; color: #1b1b1b; }
      .btn-accent { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .btn-accent:hover { background: #fff; color: #1b1b1b; }
      button:disabled { opacity: .4; cursor: default; }
      /* ховаємо скролбари — гортання колесом (видно по руху карток) */
      * { scrollbar-width: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }

      #app { display: flex; height: 100vh; gap: 8px; padding: 8px; }
      .col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
      .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      .header { font-size: 12px; color: var(--ink); text-align: center; padding: 10px; background: var(--rail); border-radius: 11px 11px 0 0; font-weight: 600; width: 100%; border: 0; cursor: pointer; }
      .header:hover { background: #3a3a3a; }

      /* ---- ліва бібліотека (ширша) ---- */
      #library { width: 280px; flex: 0 0 auto; padding: 8px; }
      #libToggle { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
      #libList { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
      .libCard { position: relative; width: calc(50% - 4px); background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; overflow: hidden; }
      .libCard::before { content: ''; display: block; padding-top: 100%; } /* квадрат: у flex % padding надійно бере ширину картки */
      .libCard.empty { background: #434343; cursor: pointer; }
      .libCard:not(.empty):hover { border-color: var(--sel); }
      .libCard.empty:hover { border-color: var(--sel); opacity: 0.8; }
      .libCard img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .libName { position: absolute; bottom: 0; left: 0; right: 0; font-size: 10px; background: rgba(0,0,0,.5); padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .libDel { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; padding: 0; border-radius: 4px; background: rgba(0,0,0,.6); color:#fff; font-size: 14px; line-height: 1; display:flex; align-items:center; justify-content:center; z-index:2; }
      .libDel:hover { background: #e53; }
      .fpDot { position: absolute; bottom: 3px; right: 3px; width: 9px; height: 9px; border-radius: 50%; background: #ff3c3c; box-shadow: 0 0 0 1px rgba(0,0,0,.5); z-index: 2; pointer-events: none; }

      /* ---- центр ---- */
      #center { flex: 1; min-width: 0; }
      #topTabs { display: flex; gap: 8px; }
      #topTabs button { flex: 1; padding: 11px 6px; font-size: 14px; }
      #centerMid { flex: 1; position: relative; min-height: 0; }
      #stageWrap { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      #stage { display: block; width: 100%; height: 100%; }
      /* список частин — N-панель: НАКЛАДАЄТЬСЯ на в'юпорт (не відсуває), кожна кнопка окремо, без фону */
      #partsList { position: absolute; top: 8px; right: 8px; width: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
      #faceList { position: absolute; width: 200px; display: none; flex-direction: column; gap: 6px; z-index: 6; }
      #slotChips, #faceChips { display: flex; flex-direction: column; gap: 6px; }
      .chip { display: block; width: 100%; text-align: center; padding: 9px 8px; border-radius: 8px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; font-size: 13px; color: var(--ink); }
      .chip:hover { background: #565656; }
      .chip.sel { background: #e8e8e8; color: #1b1b1b; border-color: #e8e8e8; font-weight: 600; }
      .chip.empty { color: var(--muted); }

      /* ---- таймлайн знизу (нейтральний, без піктограм) ---- */
      #timelineBar { flex: 0 0 auto; padding: 8px; }
      .tlrow { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
      .tlrow select { background: var(--rail); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 13px; }
      .tlrow button { font-size: 12px; }
      .tltime { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; margin-left: auto; }
      /* таймлайн — тік-рулер + per-bone треки */
      #tlWrapper { margin-top: 2px; position: relative; overflow: hidden; }
      #tlOverlays { position: absolute; top: 0; left: 104px; right: 0; bottom: 0; pointer-events: none; z-index: 15; overflow: hidden; }
      .tlOverlayLine { position: absolute; top: 0; bottom: 0; width: 2px; margin-left: -1px; pointer-events: none; }
      #tlHeaderRow { display: flex; }
      #tlBoneSpacer { flex: 0 0 104px; background: var(--rail); border: 1px solid var(--line); border-right: none; border-radius: 8px 0 0 0; }
      #tlTicks { flex: 1; position: relative; height: 24px; background: var(--rail); border: 1px solid var(--line); border-left: none; border-radius: 0 8px 0 0; cursor: pointer; overflow: hidden; user-select: none; }
      #tlTicks .tick { position: absolute; top: 2px; transform: translateX(-50%); color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; pointer-events: none; }
      #tlTicks .tick::after { content: ''; position: absolute; left: 50%; top: 14px; width: 1px; height: 6px; background: var(--line); }
      #tlBoneWrap { display: flex; border: 1px solid var(--line); border-top: none; border-radius: 0 0 8px 8px; max-height: 154px; overflow: hidden; }
      #tlBoneLabels { flex: 0 0 104px; overflow-y: scroll; border-right: 1px solid var(--line); scrollbar-width: none; }
      #tlBoneLabels::-webkit-scrollbar { display: none; }
      #tlBoneTracks { flex: 1; overflow-y: scroll; position: relative; scrollbar-width: none; }
      #tlBoneTracks::-webkit-scrollbar { display: none; }
      .boneLabel { height: 22px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid rgba(74,74,74,.3); }
      .boneLabel:hover { background: rgba(255,255,255,.04); }
      .boneLabel.sel { color: var(--ink); background: rgba(255,154,31,.12); }
      .boneTrack { position: relative; height: 22px; border-bottom: 1px solid rgba(74,74,74,.3); }
      .keyDot { position: absolute; bottom: 4px; width: 10px; height: 10px; margin-left: -5px; border-radius: 50%; background: var(--accent); border: 1px solid #000; cursor: pointer; z-index: 3; overflow: visible; }
      .keyDot.sel { background: #fff; }
      .keyDot.smooth { border-radius: 3px; }
      .dotLabel { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 7px; color: var(--accent); pointer-events: none; white-space: nowrap; font-variant-numeric: tabular-nums; opacity: 0.85; }
      .keyDot.sel .dotLabel { color: #fff; }
      .playhead { position: absolute; top: 0; bottom: 0; width: 2px; margin-left: -1px; background: var(--accent); pointer-events: none; z-index: 4; }
      .frameMark { position: absolute; top: 0; bottom: 0; width: 2px; margin-left: -1px; background: #fff; opacity: .5; pointer-events: none; z-index: 2; }
      .phBadge { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--accent); color: #1b1b1b; font-size: 10px; font-weight: 600; padding: 1px 4px; border-radius: 0 0 4px 4px; font-variant-numeric: tabular-nums; }
      /* Ghost markers */
      .ghostMark { position: absolute; top: 0; bottom: 0; width: 14px; margin-left: -7px; background: linear-gradient(to right,transparent calc(50% - 1px),rgba(255,154,31,.8) calc(50% - 1px),rgba(255,154,31,.8) calc(50% + 1px),transparent calc(50% + 1px)); cursor: ew-resize; z-index: 3; pointer-events: auto; }
      .ghostFill { position: absolute; top: 0; bottom: 0; background: rgba(255,154,31,0.12); pointer-events: none; z-index: 1; }

      /* ---- AI drop zone ---- */
      .ai-drop-zone { background:var(--rail); border:1px solid var(--line); border-radius:8px; cursor:pointer; position:relative; overflow:hidden; transition:border-color .15s; }
      .ai-drop-zone:hover, .ai-drop-zone.drag-over { border-color: var(--sel); }

      /* ---- права панель (ширша) ---- */
      #right { width: 480px; flex: 0 0 auto; }
      #preview { flex: 0 0 auto; position: relative; aspect-ratio: 20 / 9; background: var(--rail); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; z-index: 1; }
      #preview.big { position: fixed; top: 8px; right: 8px; aspect-ratio: auto; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,.6); }
      #lv-preview { flex: 0 0 auto; position: relative; aspect-ratio: 20 / 9; background: var(--rail); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; z-index: 1; }
      #lv-preview.big { position: fixed; top: 8px; right: 8px; aspect-ratio: auto; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,.6); }
      #preview iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
      #previewHint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; pointer-events: none; }
      #previewClick { position: absolute; inset: 0; z-index: 5; cursor: default; }
      #iconBar { display: flex; gap: 6px; padding: 2px; }
      .iconToggle { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 9px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; color: #fff; }
      .iconToggle input { display: none; }
      .iconToggle svg { width: 20px; height: 20px; }
      .iconToggle:has(input:checked), .iconToggle.on { background: var(--accent); border-color: var(--accent); color: #1b1b1b; }
      .iconToggle:hover { background: #5c5c5c; }
      .iconToggle.on:hover, .iconToggle:has(input:checked):hover { background: #ffb040; }
      .planHead button.on:hover { background: #ffb040; color: #1b1b1b; }
      #lv-planToggle.on:hover { background: #ffb040; }
      #lv-levelToolbar button.on { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      #lv-levelToolbar button.on:hover { background: #ffb040; }
      /* level editor library grid */
      #lv-libGrid { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
      /* level editor list items */
      .item { padding: 6px 9px; border-radius: 8px; background: var(--rail); border: 1px solid var(--line); cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
      .item.sel { background: var(--accent); color: #1b1b1b; font-weight: 600; border-color: var(--accent); }
      .item .x { opacity: .5; padding: 0 4px; font-size: 11px; }
      #tools { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
      #tools .body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      .btns { display: flex; gap: 6px; }
      .btns.oneRow button { flex: 1; font-size: 12px; padding: 8px 4px; }
      #imgGrid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 224px; overflow-y: auto; align-content: flex-start; }
      .imgCell { position: relative; width: calc(33.333% - 4px); background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; cursor: pointer; }
      #lv-levelList { display: flex; flex-wrap: wrap; gap: 6px; max-height: 230px; overflow-y: auto; align-content: flex-start; }
      .lvCard { position: relative; width: calc(33.333% - 4px); aspect-ratio: 1; background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; color: var(--ink); padding: 6px; overflow: hidden; }
      .lvCard:hover { border-color: var(--sel); }
      .lvCard.sel { border-color: var(--accent); background: rgba(255,154,31,.16); color: #fff; font-weight: 600; }
      .lvCard.empty { opacity: .45; }
      .lvCard.empty:hover { opacity: 1; }
      .lvDel { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; padding: 0; border-radius: 4px; background: rgba(0,0,0,.6); color: #fff; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
      .planPanel { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      #lv-planToggle.on, #lv-planToggleB.on { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .planHead { display: flex; }
      .planHead button { flex: 1; border-radius: 0; font-size: 12px; padding: 7px 4px; }
      .planHead button.on { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .planBody { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; }
      .planBody button { flex: 1 1 calc(50% - 3px); font-size: 12px; padding: 7px 4px; }
      #lv-fillMenu { position: absolute; left: 8px; bottom: 8px; flex-direction: column-reverse; gap: 6px; z-index: 6; width: 180px; }
      .fillBtn { display: block; width: 100%; text-align: center; padding: 9px 8px; border-radius: 8px; background: #4a4a4a; border: 1px solid var(--line); cursor: pointer; font-size: 13px; color: var(--ink); }
      .fillBtn:hover { background: #565656; }
      .fillBtn.off { opacity: .45; text-decoration: line-through; }
      .fillBtn.solo { background: var(--accent); color: #1b1b1b; font-weight: 600; }
      .fillBtn.solo:hover { background: #ffb040; }
      .fillBtn.blocked { opacity: .35; pointer-events: none; }
      /* згортувані секції правої панелі */
      .secToggle { text-align: left; }
      .secToggle::before { content: '▸ '; opacity: .8; }
      .secToggle.open::before { content: '▾ '; }
      .secBody { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      /* картки неігрових персонажів (drag → зона спавна) */
      #lv-npcList, #npcList { display: flex; flex-wrap: wrap; gap: 6px; max-height: 230px; overflow-y: auto; align-content: flex-start; }
      .npcCard { position: relative; width: calc(33.333% - 4px); aspect-ratio: 1; background: #4a4a4a; border: 1px solid var(--line); border-radius: 8px; cursor: grab; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .npcCard:hover { border-color: var(--sel); }
      .npcCard.pending { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent); cursor: crosshair; }
      .npcCard:active { cursor: grabbing; }
      .npcCard img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }
      .npcCard .npcName { position: absolute; bottom: 2px; left: 2px; right: 2px; font-size: 10px; text-align: center; color: #fff; text-shadow: 0 1px 2px #000; pointer-events: none; }
      .npcEmpty { font-size: 12px; color: var(--muted); padding: 8px 2px; }
      .imgCell::before { content: ''; display: block; padding-top: 100%; } /* квадрат */
      .imgCell.empty { background: #434343; cursor: pointer; }
      .imgCell.empty:hover { border-color: var(--sel); opacity: 0.8; }
      .imgCell.sel { border-color: var(--accent); }
      .imgCell:not(.empty):hover { border-color: var(--sel); }
      .imgCell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
      .row > label { flex: 0 0 64px; color: var(--muted); }
      .row input[type=range] { flex: 1; accent-color: var(--sel); }
      .val { flex: 0 0 36px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
      details.adv { border-top: 1px solid var(--line); padding-top: 6px; }
      details.adv summary { cursor: pointer; color: var(--muted); font-size: 12px; padding: 4px 0; }
      details.adv .row { margin-top: 6px; }
      #status { font-size: 12px; color: var(--muted); min-height: 0; }
      #lv-libSelect:hover { background: #565656 !important; }

      /* ─── Mobile bottom dock ─────────────────────────────────────────── */
      #mob-dock { display: none; flex-direction: column; flex-shrink: 0; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      #mob-tabRow { display: flex; }
      .mob-tab { flex: 1; padding: 6px 3px; font-size: 11px; font-weight: 600; border-radius: 0; background: var(--rail); border: 0; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); color: var(--muted); cursor: pointer; }
      .mob-tab:last-child { border-right: 0; }
      .mob-tab.on { background: var(--accent); color: #1b1b1b; border-bottom-color: var(--accent); }
      .mob-panel { display: none; flex-direction: row; gap: 5px; padding: 5px 6px; overflow-x: auto; align-items: center; min-height: 50px; }
      .mob-panel.on { display: flex; }
      .mob-tool { flex: 0 0 auto; padding: 7px 10px; font-size: 12px; white-space: nowrap; min-height: 34px; }
      .mob-tool.on { background: var(--accent) !important; color: #1b1b1b !important; font-weight: 600; }
      #mob-prompt-row { display: flex; gap: 5px; padding: 4px 6px; border-top: 1px solid var(--line); align-items: center; }
      #mob-aiPrompt { flex: 1; height: 32px; background: var(--rail); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 4px 8px; font-size: 12px; font-family: inherit; outline: none; }
      #mob-aiGenBtn { flex: 0 0 auto; padding: 6px 10px; font-size: 12px; }
      #mob-actions { display: flex; gap: 6px; padding: 5px 6px; border-top: 1px solid var(--line); }
      #mob-actions button { flex: 1; padding: 8px 4px; font-size: 13px; }

      /* ─── Mobile layout (екран < 900px) ──────────────────────────────── */
      @media (max-width: 900px) {
        html, body { overflow: hidden; }
        #app { flex-direction: column; padding: 4px; gap: 4px; height: 100dvh; }

        /* "Flatten" center — його діти стають прямими дітьми #app */
        #center { display: contents; }

        /* Вкладки — ПЕРШІ (order:1), без кнопок "Скоро" */
        #topTabs { order: 1; display: flex; gap: 4px; flex-shrink: 0; }
        #topTabs button { flex: 1; padding: 7px 4px; font-size: 12px; min-height: 34px; }
        #topTabs button[data-soon] { display: none; }

        /* Canvas — займає весь вільний простір */
        #centerMid { order: 4; flex: 1; min-height: 0; position: relative; }

        /* Таймлайн — схований */
        #timelineBar { display: none !important; }

        /* canvas — без браузерного scroll/zoom */
        #lv-stage, #stage { touch-action: none; }

        /* ════ CHAR EDITOR ════════════════════════════════════════════════ */
        .mode-char #library {
          order: 2; display: flex !important;
          width: 100% !important; flex-direction: row !important; align-items: center;
          padding: 4px; gap: 4px; min-height: 90px; max-height: 90px;
        }
        .mode-char #libToggle {
          flex: 0 0 auto; width: auto; min-width: 58px; padding: 8px 6px; font-size: 11px;
        }
        .mode-char #libList {
          flex-direction: row !important; flex-wrap: nowrap !important;
          overflow-x: auto; overflow-y: hidden; height: 78px; min-height: 78px; gap: 6px !important;
        }
        .mode-char #libList .libCard {
          flex: 0 0 72px !important; width: 72px !important; min-width: 72px; height: 72px;
        }
        .mode-char #libList .libCard::before { display: none; }
        .mode-char #libList .libCard img {
          position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
        }
        .mode-char #right {
          order: 6; display: flex !important;
          width: 100% !important; flex-direction: row !important; align-items: center;
          min-height: 56px; max-height: 56px; gap: 6px; padding: 4px; overflow: hidden;
        }
        .mode-char #preview { display: none !important; }
        .mode-char #iconBar { flex: 0 0 auto; flex-wrap: nowrap; gap: 4px; padding: 0; }
        .mode-char #tools { display: none !important; }
        #charMobileActions { display: none; gap: 6px; flex: 1; }
        .mode-char #charMobileActions { display: flex !important; }

        /* ════ LEVEL EDITOR ══════════════════════════════════════════════ */

        /* Смуга рівнів — order:2, між вкладками(1) і бібліотекою тайлів(3) */
        .mode-level #lv-levelBar {
          display: flex !important; order: 2;
          align-items: center; gap: 4px; padding: 4px;
          min-height: 52px; max-height: 52px; overflow: hidden;
          background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
        }
        #lv-levelBarList {
          flex: 1; display: flex; flex-direction: row; flex-wrap: nowrap;
          overflow-x: auto; overflow-y: hidden; gap: 4px; height: 40px;
        }
        #lv-levelBarList .lvCard {
          flex: 0 0 auto; width: auto !important; aspect-ratio: unset !important;
          height: 36px; min-width: 48px; max-width: 110px;
          font-size: 11px; padding: 0 8px; border-radius: 6px;
          display: flex; align-items: center; justify-content: center;
        }
        #lv-levelBarList .lvCard.empty { display: none; }
        #lv-levelBarList .lvDel { display: none; }
        #lv-levelBarAdd {
          flex: 0 0 36px; width: 36px; height: 36px; padding: 0;
          font-size: 18px; border-radius: 8px; line-height: 1;
        }

        .mode-level #lv-library {
          order: 3;
          width: 100% !important; flex-direction: row !important; align-items: center;
          padding: 4px; gap: 6px; min-height: 84px; max-height: 84px;
        }
        .mode-level #lv-library > select {
          flex: 0 0 auto; min-width: 64px; max-width: 80px;
          padding: 6px 2px; font-size: 11px; text-align: center;
          background: var(--rail); color: var(--ink);
          border: 1px solid var(--line); border-radius: 8px;
          -webkit-appearance: none; appearance: none; cursor: pointer;
        }
        .mode-level #lv-libGrid {
          flex-direction: row !important; flex-wrap: nowrap !important;
          overflow-x: auto; overflow-y: hidden; height: 76px; min-height: 76px;
        }
        .mode-level #lv-libGrid .libCard {
          flex: 0 0 68px !important; width: 68px !important; min-width: 68px; height: 68px;
        }
        .mode-level #lv-libGrid .libCard::before { display: none; }
        .mode-level #lv-libGrid .libCard img {
          position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
        }
        .libCard.pending { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent); }

        /* Тулбар рівнів — 2 колонки, без скролу, все видно */
        #lv-levelToolbar {
          order: 5;
          flex-wrap: wrap !important; overflow: visible !important;
          gap: 4px; padding: 4px; flex-shrink: 0;
          min-height: unset !important;
        }
        #lv-levelToolbar button {
          flex: 1 1 calc(50% - 4px) !important;
          white-space: normal !important; font-size: 11px !important;
          padding: 7px 4px !important; min-height: 36px !important;
          line-height: 1.2; text-align: center;
        }

        /* Mob dock — показуємо в режимі рівнів */
        .mode-level #mob-dock { display: flex; order: 5; }
        /* Ховаємо старий тулбар і праву панель — замінені доком */
        .mode-level #lv-levelToolbar { display: none !important; }
        .mode-level #lv-right { display: none !important; }

        /* Звужуємо смугу рівнів */
        .mode-level #lv-levelBar { min-height: 44px !important; max-height: 44px !important; }
        #lv-levelBarList .lvCard { height: 32px !important; }
        #lv-levelBarAdd { height: 32px !important; width: 32px !important; }

        /* Звужуємо бібліотеку тайлів */
        .mode-level #lv-library { min-height: 68px !important; max-height: 68px !important; padding: 3px 4px !important; }
        .mode-level #lv-aiPanel { display: none !important; }
        .mode-level #lv-libGrid { height: 60px !important; min-height: 60px !important; }
        .mode-level #lv-libGrid .libCard { flex: 0 0 56px !important; width: 56px !important; min-width: 56px !important; height: 56px !important; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="mode-char">
      <!-- ЛІВА БІБЛІОТЕКА — редактор персонажів -->
      <aside id="library" class="col pane">
        <button id="libToggle" class="light">Герої</button>
        <div id="libList"></div>
        <div id="aiPanel" style="flex:none;display:flex;flex-direction:column;gap:6px;padding-top:8px;border-top:1px solid var(--line)">
          <textarea id="aiPrompt" placeholder="Опис персонажа…" style="flex:1;width:100%;background:var(--rail);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;resize:none;font-family:inherit;outline:none"></textarea>
          <div id="aiRefDrop" class="ai-drop-zone" style="flex:0 0 72px">
            <img id="aiRefImg" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain">
            <input type="file" id="aiRefInput" accept="image/*" style="display:none">
          </div>
          <button id="aiGenBtn" style="width:100%">Створити</button>
        </div>
      </aside>

      <!-- ЛІВА БІБЛІОТЕКА — редактор рівнів -->
      <aside id="lv-library" class="col pane" style="width:280px;flex:0 0 auto;padding:8px">
        <select id="lv-libSelect" style="width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:600;background:#4a4a4a;color:var(--ink);border:0;cursor:pointer;text-align:center;appearance:none;-webkit-appearance:none">
          <option value="sky">Небо</option>
          <option value="clouds">Хмари</option>
          <option value="bg">Задній фон</option>
          <option value="frontbg">Передній фон</option>
          <option value="map" selected>Карта</option>
          <option value="decor">Декор</option>
          <option value="collider">Колайдер</option>
          <option value="interactive">Інтерактив</option>
          <option value="trap">Пастки</option>
          <option value="foreground">Передній план</option>
        </select>
        <input type="file" id="lv-fileInput" accept="image/png,image/*" multiple style="display:none" />
        <div id="lv-colliderTools" style="display:none"></div>
        <div id="lv-libGrid" style="flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start"></div>
        <div id="lv-aiPanel" style="flex:none;display:flex;flex-direction:column;gap:6px;padding-top:8px;border-top:1px solid var(--line)">
          <textarea id="lv-aiPrompt" placeholder="Опис декорації…" style="flex:1;width:100%;background:var(--rail);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;resize:none;font-family:inherit;outline:none"></textarea>
          <div id="lv-aiRefDrop" class="ai-drop-zone" style="flex:0 0 72px">
            <img id="lv-aiRefImg" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain">
            <input type="file" id="lv-aiRefInput" accept="image/*" style="display:none">
          </div>
          <button id="lv-aiGenBtn" style="width:100%">Створити</button>
        </div>
      </aside>

      <!-- ЦЕНТР -->
      <section id="center" class="col">
        <div id="topTabs">
          <button class="light" data-tab="char">Редактор Персонажів</button>
          <button data-tab="level">Редактор Рівнів</button>
          <button data-soon>Редактор Інтерфейсу</button>
          <button data-soon>Редактор Звуку</button>
          <button data-soon>Редактор Історії</button>
        </div>
        <!-- Мобільна смуга вибору рівня (між вкладками і бібліотекою тайлів) -->
        <div id="lv-levelBar" style="display:none">
          <div id="lv-levelBarList"></div>
          <button id="lv-levelBarAdd" class="btn-accent" title="Новий рівень">＋</button>
        </div>
        <div id="centerMid">
          <div id="stageWrap"><canvas id="stage"></canvas></div>
          <div id="lv-stageWrap" style="position:absolute;inset:0;background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden"><canvas id="lv-stage" style="display:block;width:100%;height:100%"></canvas><div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.35);pointer-events:none;white-space:nowrap">тягни ассет · <b>G/R/S/M</b> · <b>Shift+D</b> дублювати · <b>H/V</b> шлях · <b>Y</b> стерти шлях · <b>J</b> снеп · <b>Del</b> · <b>Ctrl+Z</b> · колесо — зум</div></div>
          <div id="partsList" style="display:none"><div id="slotChips"></div></div>
          <div id="faceList"><div id="faceChips"></div></div>
          <div id="lv-fillMenu" style="display:none"></div>
        </div>
        <div id="timelineBar" class="pane">
          <div class="tlrow">
            <select id="charSel" title="Персонаж (свій набір анімацій)" style="flex:1.2;min-width:0"></select>
            <select id="anim" style="flex:2;min-width:0"></select>
            <button id="bakeBtn">Створити</button>
            <button id="renameAnimBtn">Перейменувати</button>
            <button id="copyAnimBtn" title="ПКМ — перемкнути на Вставити">Скопіювати</button>
            <button id="resetAnim">Скинути</button>
            <button id="delAnimBtn">Видалити</button>
            <button id="hotkeyBtn" title="Призначити клавішу-тригер для цієї анімації у грі">Хоткей (-)</button>
          </div>
          <div class="tlrow">
            <button id="keyBtn">Ключ (K)</button>
            <button id="allKeyBtn" title="Поставити загальний ключ для всіх частин тіла (те саме що K)">Загальний ключ</button>
            <button id="convertToKeysBtn" title="Семплювати процедурну анімацію → ключі кадрів 0,3,6… зі згладженням. Потім редагуй як завгодно.">Конвертувати в ключі</button>
            <button id="delKeyBtn">Видалити ключ</button>
            <button id="invertBtn" title="Інвертувати напрям обертання вибраної частини між 2 виділеними ключами (Shift-клік по точках)">Інвертувати</button>
            <button id="ghostBtn" title="Показувати попередні/наступні кадри як привиди під персонажем">Привид</button>
            <button id="firstFrameBtn" title="Показувати перший кадр анімації як прозорий орієнтир">Перший кадр</button>
            <button id="linkBtn" title="ПКМ — перемкнути лінійно/згладжено">Звʼязати: лінійно</button>
          </div>
          <div id="tlWrapper">
            <div id="tlOverlays"></div>
            <div id="tlHeaderRow">
              <div id="tlBoneSpacer"></div>
              <div id="tlTicks" title="Скраб — клік/тягни · Колесо — зум кадрів"></div>
            </div>
            <div id="tlBoneWrap">
              <div id="tlBoneLabels"></div>
              <div id="tlBoneTracks"></div>
            </div>
          </div>
        </div>
        <!-- LEVEL EDITOR TOOLBAR — same height as #timelineBar, visible in mode-level -->
        <div id="lv-levelToolbar" class="pane">
          <!-- Іконки: малювати шлях / підняти / опустити / вирівняти / стерти -->
          <button id="lv-pathHBtn" title="Малювати підлогу (H)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 5L20 10v1L12 16 4 11v-1z"/><path d="M4 11l8 5 8-5"/></svg></button>
          <button id="lv-pathVBtn" title="Намалювати вертикальний шлях (стіна)">Вертикальний шлях</button>
          <button id="lv-raiseBtn" title="Підняти клітинку (1)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 16V8M9 11l3-3 3 3"/><rect x="4" y="18" width="16" height="3" rx="1" fill="currentColor" stroke="none" opacity=".6"/></svg></button>
          <button id="lv-lowerBtn" title="Опустити клітинку (2)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v8M9 13l3 3 3-3"/><rect x="4" y="18" width="16" height="3" rx="1" fill="currentColor" stroke="none" opacity=".6"/></svg></button>
          <button id="lv-flatBtn" title="Вирівняти клітинку (3)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 9h14M5 15h14"/><rect x="4" y="19" width="16" height="3" rx="1" fill="currentColor" stroke="none" opacity=".6"/></svg></button>
          <button id="lv-walkBtn" title="Зелений колайдер прохідності (4) — перекриває авто-виріз футпринта ассета" style="color:#5aff8f"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M12 4l8 4.5v1L12 14 4 9.5v-1z"/><path d="M9 16.5l3 1.7 3-1.7"/></svg></button>
          <button id="lv-erasePathBtn" title="Стерти клітинку шляху (Y)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20 20H8L3 15l11-11 7 7-2 3z"/><path d="M7.5 17.5l4-4"/></svg></button>
          <button id="lv-addSpawn" title="Додати стартову локацію (точку спавна, до 5)">＋ Спавн</button>
          <button id="lv-delSpawn" title="Прибрати вибрану точку спавна">－ Спавн</button>
          <button id="lv-enemySpawnBtn" title="Намалювати зону спавна ворогів (червоний 3×3). Ворог зʼявиться у випадковій точці зони.">Спавн ворогів</button>
          <button id="lv-enemyEraseBtn" title="Прибрати зону спавна ворогів під курсором">Прибрати спавн ворогів</button>
          <div id="lv-parallaxRow" style="display:flex;align-items:center;gap:6px;margin-left:auto">
            <select id="lv-parallaxLayer" title="Шар для налаштування дальності паралаксу" style="white-space:nowrap;padding:6px 8px;border-radius:8px;background:#4a4a4a;color:var(--ink);border:0;cursor:pointer;font-size:12px;font-weight:600;appearance:none;-webkit-appearance:none">
              <option value="sky">Небо</option>
              <option value="clouds">Хмари</option>
              <option value="bg" selected>Задній фон</option>
              <option value="frontbg">Передній фон</option>
              <option value="foreground">Передній план</option>
            </select>
            <span style="font-size:12px;color:var(--muted);white-space:nowrap">Дальність</span>
            <input type="range" id="lv-parallaxSlider" min="0" max="1" step="0.01" value="0.5" title="0 — разом із картою, 1 — нерухоме (найдальше)" style="width:110px;accent-color:var(--sel)" />
            <span id="lv-parallaxVal" style="font-size:12px;color:var(--muted);width:30px;text-align:right">0.50</span>
          </div>
          <button id="lv-clearCollider" title="Очистити всі шляхи">Очистити все</button>
        </div>
      </section>

      <!-- ПРАВА ПАНЕЛЬ -->
      <aside id="right" class="col">
        <div id="preview"><iframe id="previewFrame" title="Превʼю гри"></iframe><div id="previewClick" title="ЛКМ — розгорнути / згорнути"></div></div>
        <div id="charMobileActions" style="display:none;gap:6px;flex:1">
          <button id="charMobSave" style="flex:1;font-size:13px;padding:8px">Зберегти</button>
          <button id="charMobPublish" class="btn-accent" style="flex:1;font-size:13px;padding:8px">Оновити гру</button>
        </div>
        <div id="iconBar">
          <label class="iconToggle" title="Показувати півоти"><input type="checkbox" id="showPivots" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></label>
          <label class="iconToggle" title="Показувати фоновий концепт"><input type="checkbox" id="showRef" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M3 17l5-4 4 3 3-3 6 5"/></svg></label>
          <label class="iconToggle" title="Чистити фон при завантаженні"><input type="checkbox" id="keyBg" checked /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l1.7 4.6L18 9.3l-4.3 1.7L12 16l-1.7-5L6 9.3l4.3-1.7zM18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg></label>
          <label class="iconToggle" title="Чорно-біле превʼю (тон без кольору)"><input type="checkbox" id="bwPreview" /><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18V3z" fill="currentColor" stroke="none"/></svg></label>
          <button class="iconToggle" id="setHeadLine" title="Лінію висоти — на маківку цього персонажа"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M12 9v9M8 14l4 4 4-4"/></svg></button>
          <button class="iconToggle" id="constructorBtn" title="Конструктор — коди елементів UI"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 9v12"/></svg></button>
        </div>
        <div id="tools" class="pane">
          <button id="partsToggle" class="header">Частини персонажа</button>
          <div id="toolsBody" class="body">
            <div class="btns oneRow">
              <button id="setPivot">Півот (Q)</button>
              <button id="mirrorBtn">Мірор (M)</button>
              <button id="cutBtn">Розріз (D)</button>
              <button id="bendFlipBtn">Напрям (B)</button>
              <button id="flipAllBtn">Фліп</button>
            </div>
            <input type="file" id="fileInput" accept="image/png,image/*" multiple style="display:none" />
            <div id="imgGrid" title="Клік — завантажити картинку · Перетягни PNG"></div>
            <div class="btns"><button id="saveChar" style="flex:1">Зберегти персонажа</button></div>

            <!-- приховані контролі (доступ через хоткеї/мишу та грід); концепт вантажиться кнопкою «Завантажити картинку» коли вибрано «Фоновий концепт» -->
            <div id="adv" style="display:none">
              <input type="range" id="rot" min="-180" max="180" step="1" /><span id="rotV"></span>
              <input type="range" id="scale" min="0.1" max="3" step="0.01" /><span id="scaleV"></span>
              <input type="range" id="bend" min="-150" max="150" step="1" value="0" /><span id="bendV"></span>
              <button id="resetPart"></button>
              <button id="faceBtn"></button>
              <button id="animDirBtn"></button>
              <button id="refBtn"></button><button id="refClear"></button>
              <input type="file" id="refInput" accept="image/*" />
            </div>
            <div id="status"></div>
          </div>
          <button id="toGameBtn" class="btn-accent" style="margin:0 8px 8px;width:calc(100% - 16px)">Оновити гру</button>
        </div>
      </aside>

      <!-- ПРАВА ПАНЕЛЬ — редактор рівнів -->
      <aside id="lv-right" class="col" style="width:480px;flex:0 0 auto">
        <div id="lv-preview">
          <iframe id="lv-previewFrame" src="index.html" title="Превʼю гри" style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block"></iframe>
          <div id="lv-previewHint" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;pointer-events:none">Превʼю гри 20:9</div>
          <div id="lv-previewClick" style="position:absolute;inset:0;z-index:5;cursor:default" title="Клік — активувати"></div>
        </div>
        <div style="display:flex;gap:6px;padding:2px">
          <button class="iconToggle" id="lv-camViewBtn" title="Накласти вид камери 20:9"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 5V3M17 5V3M7 19v2M17 19v2"/></svg></button>
          <button class="iconToggle" id="lv-showColliderBtn" title="Показати/сховати колайдери"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg></button>
          <button class="iconToggle on" id="lv-linesBtn" title="Показати/сховати лінії початку і фінішу шарів"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 3v18M18 3v18"/></svg></button>

          <button class="mob-tab" data-mob-panel="mobSettings">Налаш.</button>
        </div>
        <div id="mobTransf" class="mob-panel on">
          <button class="mob-tool" data-mob-key="KeyG">Перемістити</button>

          <button class="mob-tool" data-mob-key="KeyS">Масштаб</button>

          <button class="mob-tool" data-mob-mirror="lv-addSpawn">＋ Спавн гравця</button>
          <button class="mob-tool" data-mob-mirror="lv-clearCollider">Очистити все</button>
        </div>
        <div id="mobSettings" class="mob-panel">
          <button class="mob-tool" data-mob-mirror="lv-fillBtn">Наповнення</button>

          <button class="mob-tool" data-mob-mirror="lv-zForward">Ближче</button>
          <button class="mob-tool" data-mob-mirror="lv-zBack">Дальше</button>
          <button class="mob-tool" data-mob-mirror="lv-zFront">Найближче</button>
          <button class="mob-tool" data-mob-mirror="lv-zBottom">Найдальше</button>
        </div>
        <div id="mob-prompt-row">
          <input type="text" id="mob-aiPrompt" placeholder="Опис декорації…">
          <button id="mob-aiGenBtn">gen</button>

    <!-- Вікно футпринта ассета (ПКМ на картці в бібліотеці рівнів) -->

    <div id="lv-fpModal" style="display:none;position:fixed;z-index:51;background:var(--panel);border:1px solid var(--line);border-radius:12px;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5)">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--rail)">
        <span id="lv-fpTitle" style="font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Колайдери ассета</span>
        <button id="lv-fpPaint" class="light" style="padding:6px 10px;font-size:12px">Малювати</button>
        <button id="lv-fpErase" style="padding:6px 10px;font-size:12px">Стерти</button>
        <button id="lv-fpClear" style="padding:6px 10px;font-size:12px">Очистити</button>
        <button id="lv-fpDone" class="btn-accent" style="padding:6px 12px;font-size:12px">Готово</button>

      </div>
    </div>

    <script type="module" src="/src/rig/main.ts"></script>
    <script>
    (function () {
      // Перемикання вкладок доку
      document.querySelectorAll('.mob-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.mob-tab').forEach(function (t) { t.classList.remove('on'); });
          document.querySelectorAll('.mob-panel').forEach(function (p) { p.classList.remove('on'); });
          btn.classList.add('on');
          var panel = document.getElementById(btn.dataset.mobPanel);
          if (panel) panel.classList.add('on');
        });
      });

      // Кнопки що диспатчать keydown (G, R, S, M, Delete …)
      document.querySelectorAll('[data-mob-key]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          window.dispatchEvent(new KeyboardEvent('keydown', { code: btn.dataset.mobKey, bubbles: true }));
          setTimeout(syncMobState, 50);
        });
      });

      // Ctrl+Z
      document.querySelectorAll('[data-mob-ctrl]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          window.dispatchEvent(new KeyboardEvent('keydown', { code: btn.dataset.mobCtrl, ctrlKey: true, bubbles: true }));
        });
      });

      // Дзеркальні кнопки — делегують на існуючі десктопні кнопки
      document.querySelectorAll('[data-mob-mirror]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var orig = document.getElementById(btn.dataset.mobMirror);
          if (orig) orig.click();
          setTimeout(syncMobState, 50);
        });
      });

      // Синхронізація стану on/off з десктопних кнопок на мобільні
      function syncMobState() {
        document.querySelectorAll('[data-mob-mirror]').forEach(function (btn) {
          var orig = document.getElementById(btn.dataset.mobMirror);
          btn.classList.toggle('on', orig ? orig.classList.contains('on') : false);
        });
      }
      setInterval(syncMobState, 400);

      // AI панель
      document.getElementById('mob-aiGenBtn')?.addEventListener('click', function () {
        var src = document.getElementById('mob-aiPrompt');
        var dst = document.getElementById('lv-aiPrompt');
        if (src && dst) dst.value = src.value;
        document.getElementById('lv-aiGenBtn')?.click();
      });

      // Зберегти / Оновити гру
      document.getElementById('mob-save')?.addEventListener('click', function () {
        document.getElementById('lv-mobSave')?.click();
      });
      document.getElementById('mob-publish')?.addEventListener('click', function () {
        document.getElementById('lv-mobPublish')?.click();
      });
    })();
    </script>
  </body>
</html>
